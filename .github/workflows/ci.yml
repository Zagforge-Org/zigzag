name: CI

on:
    push:
        branches: [main, dev]
        tags: ["v*"]
    pull_request:
        branches: [main, dev]

permissions:
    contents: write

jobs:
    fmt:
        name: Format check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: mlugg/setup-zig@v2
              with:
                  version: "0.15.2"
            - name: Check formatting
              run: zig fmt src/

    test:
        name: Tests (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
        steps:
            - uses: actions/checkout@v6
            - name: Init submodules (sparse)
              shell: bash
              run: |
                  git submodule update --init --depth 1
                  git -C ast/vendor/tree-sitter sparse-checkout init --cone
                  git -C ast/vendor/tree-sitter sparse-checkout set lib
                  git -C ast/grammars/tree-sitter-python sparse-checkout init --cone
                  git -C ast/grammars/tree-sitter-python sparse-checkout set src
                  git -C ast/grammars/tree-sitter-javascript sparse-checkout init --cone
                  git -C ast/grammars/tree-sitter-javascript sparse-checkout set src
                  git -C ast/grammars/tree-sitter-zig sparse-checkout init --cone
                  git -C ast/grammars/tree-sitter-zig sparse-checkout set src
                  git -C ast/grammars/tree-sitter-typescript sparse-checkout init --cone
                  git -C ast/grammars/tree-sitter-typescript sparse-checkout set typescript/src tsx/src common
                  git -C ast/grammars/tree-sitter-rust sparse-checkout init --cone
                  git -C ast/grammars/tree-sitter-rust sparse-checkout set src
                  git -C ast/grammars/tree-sitter-go sparse-checkout init --cone
                  git -C ast/grammars/tree-sitter-go sparse-checkout set src
                  git -C ast/grammars/tree-sitter-c sparse-checkout init --cone
                  git -C ast/grammars/tree-sitter-c sparse-checkout set src
                  git -C ast/grammars/tree-sitter-cpp sparse-checkout init --cone
                  git -C ast/grammars/tree-sitter-cpp sparse-checkout set src
            - uses: mlugg/setup-zig@v2
              with:
                  version: "0.15.2"
            - uses: actions/setup-node@v6
              with:
                  node-version: "24"
            - name: Bundle dashboard template
              shell: bash
              run: python3 src/templates/bundle.py
            - name: Compile AST library
              shell: bash
              run: |
                  TS=ast/vendor/tree-sitter/lib/src
                  F="-std=gnu11 -Iast/vendor/tree-sitter/lib/include -Iast/vendor/tree-sitter/lib/src -Iast/src -Iast/grammars/tree-sitter-python/src -Iast/grammars/tree-sitter-javascript/src -Iast/grammars/tree-sitter-zig/src -Iast/grammars/tree-sitter-typescript/typescript/src -Iast/grammars/tree-sitter-typescript/tsx/src -Iast/grammars/tree-sitter-rust/src -Iast/grammars/tree-sitter-go/src -Iast/grammars/tree-sitter-c/src -Iast/grammars/tree-sitter-cpp/src"
                  mkdir -p .zig-cache
                  zig cc -c $F $TS/alloc.c              -o .zig-cache/ts_alloc.o
                  zig cc -c $F $TS/get_changed_ranges.c -o .zig-cache/ts_get_changed_ranges.o
                  zig cc -c $F $TS/language.c           -o .zig-cache/ts_language.o
                  zig cc -c $F $TS/lexer.c              -o .zig-cache/ts_lexer.o
                  zig cc -c $F $TS/node.c               -o .zig-cache/ts_node.o
                  zig cc -c $F $TS/parser.c             -o .zig-cache/ts_parser.o
                  zig cc -c $F $TS/query.c              -o .zig-cache/ts_query.o
                  zig cc -c $F $TS/stack.c              -o .zig-cache/ts_stack.o
                  zig cc -c $F $TS/subtree.c            -o .zig-cache/ts_subtree.o
                  zig cc -c $F $TS/tree_cursor.c        -o .zig-cache/ts_tree_cursor.o
                  zig cc -c $F $TS/tree.c               -o .zig-cache/ts_tree.o
                  zig cc -c $F $TS/wasm_store.c         -o .zig-cache/ts_wasm_store.o
                  zig cc -c $F ast/grammars/tree-sitter-python/src/parser.c      -o .zig-cache/ts_py_parser.o
                  zig cc -c $F ast/grammars/tree-sitter-python/src/scanner.c     -o .zig-cache/ts_py_scanner.o
                  zig cc -c $F ast/grammars/tree-sitter-javascript/src/parser.c  -o .zig-cache/ts_js_parser.o
                  zig cc -c $F ast/grammars/tree-sitter-javascript/src/scanner.c -o .zig-cache/ts_js_scanner.o
                  zig cc -c $F ast/grammars/tree-sitter-zig/src/parser.c                          -o .zig-cache/ts_zig_parser.o
                  zig cc -c $F ast/grammars/tree-sitter-typescript/typescript/src/parser.c        -o .zig-cache/ts_ts_parser.o
                  zig cc -c $F ast/grammars/tree-sitter-typescript/typescript/src/scanner.c       -o .zig-cache/ts_ts_scanner.o
                  zig cc -c $F ast/grammars/tree-sitter-typescript/tsx/src/parser.c               -o .zig-cache/ts_tsx_parser.o
                  zig cc -c $F ast/grammars/tree-sitter-typescript/tsx/src/scanner.c              -o .zig-cache/ts_tsx_scanner.o
                  zig cc -c $F ast/grammars/tree-sitter-rust/src/parser.c                        -o .zig-cache/ts_rust_parser.o
                  zig cc -c $F ast/grammars/tree-sitter-rust/src/scanner.c                       -o .zig-cache/ts_rust_scanner.o
                  zig cc -c $F ast/grammars/tree-sitter-go/src/parser.c                         -o .zig-cache/ts_go_parser.o
                  zig cc -c $F ast/grammars/tree-sitter-c/src/parser.c                          -o .zig-cache/ts_c_parser.o
                  zig cc -c $F ast/grammars/tree-sitter-cpp/src/parser.c                       -o .zig-cache/ts_cpp_parser.o
                  zig cc -c $F ast/grammars/tree-sitter-cpp/src/scanner.c                      -o .zig-cache/ts_cpp_scanner.o
                  zig cc -c $F ast/src/chunker.c                                                  -o .zig-cache/ts_chunker.o
                  zig ar rcs .zig-cache/ts_ast.a .zig-cache/ts_alloc.o .zig-cache/ts_get_changed_ranges.o .zig-cache/ts_language.o .zig-cache/ts_lexer.o .zig-cache/ts_node.o .zig-cache/ts_parser.o .zig-cache/ts_query.o .zig-cache/ts_stack.o .zig-cache/ts_subtree.o .zig-cache/ts_tree_cursor.o .zig-cache/ts_tree.o .zig-cache/ts_wasm_store.o .zig-cache/ts_py_parser.o .zig-cache/ts_py_scanner.o .zig-cache/ts_js_parser.o .zig-cache/ts_js_scanner.o .zig-cache/ts_zig_parser.o .zig-cache/ts_ts_parser.o .zig-cache/ts_ts_scanner.o .zig-cache/ts_tsx_parser.o .zig-cache/ts_tsx_scanner.o .zig-cache/ts_rust_parser.o .zig-cache/ts_rust_scanner.o .zig-cache/ts_go_parser.o .zig-cache/ts_c_parser.o .zig-cache/ts_cpp_parser.o .zig-cache/ts_cpp_scanner.o .zig-cache/ts_chunker.o
            - name: Run tests
              shell: bash
              run: zig test -lc --dep options -Mroot=src/root.zig -Moptions=src/cli/version/fallback.zig .zig-cache/ts_ast.a

    build:
        name: Build (${{ matrix.target }})
        runs-on: ubuntu-latest
        needs: [fmt, test]
        strategy:
            matrix:
                include:
                    - target: x86_64-linux-gnu
                      archive: zigzag-x86_64-linux.tar.gz
                    - target: aarch64-linux-gnu
                      archive: zigzag-aarch64-linux.tar.gz
                    - target: x86_64-macos
                      archive: zigzag-x86_64-macos.tar.gz
                    - target: aarch64-macos
                      archive: zigzag-aarch64-macos.tar.gz
                    - target: x86_64-windows
                      archive: zigzag-x86_64-windows.zip
        steps:
            - uses: actions/checkout@v6
            - name: Init submodules (sparse)
              run: |
                  git submodule update --init --depth 1
                  git -C ast/vendor/tree-sitter sparse-checkout init --cone
                  git -C ast/vendor/tree-sitter sparse-checkout set lib
                  git -C ast/grammars/tree-sitter-python sparse-checkout init --cone
                  git -C ast/grammars/tree-sitter-python sparse-checkout set src
                  git -C ast/grammars/tree-sitter-javascript sparse-checkout init --cone
                  git -C ast/grammars/tree-sitter-javascript sparse-checkout set src
                  git -C ast/grammars/tree-sitter-zig sparse-checkout init --cone
                  git -C ast/grammars/tree-sitter-zig sparse-checkout set src
                  git -C ast/grammars/tree-sitter-typescript sparse-checkout init --cone
                  git -C ast/grammars/tree-sitter-typescript sparse-checkout set typescript/src tsx/src common
                  git -C ast/grammars/tree-sitter-rust sparse-checkout init --cone
                  git -C ast/grammars/tree-sitter-rust sparse-checkout set src
                  git -C ast/grammars/tree-sitter-go sparse-checkout init --cone
                  git -C ast/grammars/tree-sitter-go sparse-checkout set src
                  git -C ast/grammars/tree-sitter-c sparse-checkout init --cone
                  git -C ast/grammars/tree-sitter-c sparse-checkout set src
                  git -C ast/grammars/tree-sitter-cpp sparse-checkout init --cone
                  git -C ast/grammars/tree-sitter-cpp sparse-checkout set src
            - uses: mlugg/setup-zig@v2
              with:
                  version: "0.15.2"
            - uses: actions/setup-node@v6
              with:
                  node-version: "24"
            - name: Bundle dashboard template
              run: python3 src/templates/bundle.py
            - name: Build release binary
              run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}

            - name: Package binary (Unix)
              if: startsWith(github.ref, 'refs/tags/') && !endsWith(matrix.target, 'windows')
              run: |
                  cd zig-out/bin
                  tar -czf ../../${{ matrix.archive }} zigzag

            - name: Package binary (Windows)
              if: startsWith(github.ref, 'refs/tags/') && endsWith(matrix.target, 'windows')
              run: |
                  cd zig-out/bin
                  zip ../../${{ matrix.archive }} zigzag.exe

            - uses: actions/upload-artifact@v5
              if: startsWith(github.ref, 'refs/tags/')
              with:
                  name: ${{ matrix.archive }}
                  path: ${{ matrix.archive }}

    sign-macos:
        name: Sign macOS binaries (ad-hoc)
        runs-on: macos-latest
        needs: build
        if: startsWith(github.ref, 'refs/tags/')
        strategy:
            matrix:
                include:
                    - archive: zigzag-aarch64-macos.tar.gz
                    - archive: zigzag-x86_64-macos.tar.gz
        steps:
            - uses: actions/download-artifact@v5
              with:
                  name: ${{ matrix.archive }}

            - name: Sign binary
              run: |
                  tar -xzf ${{ matrix.archive }}
                  codesign --sign - --force --options runtime zigzag
                  tar -czf ${{ matrix.archive }} zigzag

            - uses: actions/upload-artifact@v5
              with:
                  name: ${{ matrix.archive }}
                  path: ${{ matrix.archive }}
                  overwrite: true

    release:
        name: Publish release
        runs-on: ubuntu-latest
        needs: [sign-macos, build]
        if: startsWith(github.ref, 'refs/tags/')
        steps:
            - uses: actions/download-artifact@v5
              with:
                  merge-multiple: true

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      zigzag-x86_64-linux.tar.gz
                      zigzag-aarch64-linux.tar.gz
                      zigzag-x86_64-macos.tar.gz
                      zigzag-aarch64-macos.tar.gz
                      zigzag-x86_64-windows.zip
                  generate_release_notes: true

            - name: Update Homebrew formula
              env:
                  TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
              if: env.TAP_TOKEN != ''
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  AARCH64_MAC_SHA=$(sha256sum zigzag-aarch64-macos.tar.gz | awk '{print $1}')
                  X86_64_MAC_SHA=$(sha256sum zigzag-x86_64-macos.tar.gz | awk '{print $1}')
                  AARCH64_LINUX_SHA=$(sha256sum zigzag-aarch64-linux.tar.gz | awk '{print $1}')
                  X86_64_LINUX_SHA=$(sha256sum zigzag-x86_64-linux.tar.gz | awk '{print $1}')

                  git clone https://x-access-token:${TAP_TOKEN}@github.com/Zagforge-Org/homebrew-zigzag.git tap
                  cd tap

                  # Update version field and all download URLs
                  sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/" Formula/zigzag.rb
                  sed -i "s|/download/v[^/]*/|/download/v${VERSION}/|g" Formula/zigzag.rb

                  # Update each platform's sha256 by matching the line after its URL
                  sed -i "/aarch64-macos/{n;s/sha256 \"[a-f0-9]*\"/sha256 \"${AARCH64_MAC_SHA}\"/}" Formula/zigzag.rb
                  sed -i "/x86_64-macos/{n;s/sha256 \"[a-f0-9]*\"/sha256 \"${X86_64_MAC_SHA}\"/}" Formula/zigzag.rb
                  sed -i "/aarch64-linux/{n;s/sha256 \"[a-f0-9]*\"/sha256 \"${AARCH64_LINUX_SHA}\"/}" Formula/zigzag.rb
                  sed -i "/x86_64-linux/{n;s/sha256 \"[a-f0-9]*\"/sha256 \"${X86_64_LINUX_SHA}\"/}" Formula/zigzag.rb

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add Formula/zigzag.rb
                  git commit -m "zigzag ${VERSION}"
                  git push
