name: CI

on:
    push:
        branches: [main, dev]
        tags: ["v*"]
    pull_request:
        branches: [main, dev]

permissions:
    contents: write

jobs:
    fmt:
        name: Format check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: mlugg/setup-zig@v2
              with:
                  version: "0.15.2"
            - name: Check formatting
              run: zig fmt src/

    test:
        name: Tests (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
        steps:
            - uses: actions/checkout@v4
            - uses: mlugg/setup-zig@v2
              with:
                  version: "0.15.2"
            - uses: actions/setup-node@v4
              with:
                  node-version: "lts/*"
            - name: Bundle dashboard template
              shell: bash
              run: python3 src/templates/bundle.py
            - name: Run tests
              shell: bash
              run: zig test --dep options -Mroot=src/root.zig -Moptions=src/cli/version/fallback.zig

    build:
        name: Build (${{ matrix.target }})
        runs-on: ubuntu-latest
        needs: [fmt, test]
        strategy:
            matrix:
                include:
                    - target: x86_64-linux-gnu
                      archive: zigzag-x86_64-linux.tar.gz
                    - target: aarch64-linux-gnu
                      archive: zigzag-aarch64-linux.tar.gz
                    - target: x86_64-macos
                      archive: zigzag-x86_64-macos.tar.gz
                    - target: aarch64-macos
                      archive: zigzag-aarch64-macos.tar.gz
                    - target: x86_64-windows
                      archive: zigzag-x86_64-windows.zip
        steps:
            - uses: actions/checkout@v4
            - uses: mlugg/setup-zig@v2
              with:
                  version: "0.15.2"
            - uses: actions/setup-node@v4
              with:
                  node-version: "lts/*"
            - name: Bundle dashboard template
              run: python3 src/templates/bundle.py
            - name: Build release binary
              run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}

            - name: Package binary (Unix)
              if: startsWith(github.ref, 'refs/tags/') && !endsWith(matrix.target, 'windows')
              run: |
                  cd zig-out/bin
                  tar -czf ../../${{ matrix.archive }} zigzag

            - name: Package binary (Windows)
              if: startsWith(github.ref, 'refs/tags/') && endsWith(matrix.target, 'windows')
              run: |
                  cd zig-out/bin
                  zip ../../${{ matrix.archive }} zigzag.exe

            - uses: actions/upload-artifact@v4
              if: startsWith(github.ref, 'refs/tags/')
              with:
                  name: ${{ matrix.archive }}
                  path: ${{ matrix.archive }}

    release:
        name: Publish release
        runs-on: ubuntu-latest
        needs: build
        if: startsWith(github.ref, 'refs/tags/')
        steps:
            - uses: actions/download-artifact@v4
              with:
                  merge-multiple: true

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      zigzag-x86_64-linux.tar.gz
                      zigzag-aarch64-linux.tar.gz
                      zigzag-x86_64-macos.tar.gz
                      zigzag-aarch64-macos.tar.gz
                      zigzag-x86_64-windows.zip
                  generate_release_notes: true
