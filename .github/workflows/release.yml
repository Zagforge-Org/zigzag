name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-linux-gnu
            archive: zigzag-x86_64-linux.tar.gz
          - target: aarch64-linux-gnu
            archive: zigzag-aarch64-linux.tar.gz
          - target: x86_64-macos
            archive: zigzag-x86_64-macos.tar.gz
          - target: aarch64-macos
            archive: zigzag-aarch64-macos.tar.gz
          - target: x86_64-windows
            archive: zigzag-x86_64-windows.zip
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Build release binary
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}

      - name: Package binary (Unix)
        if: ${{ !endsWith(matrix.target, 'windows') }}
        run: |
          cd zig-out/bin
          tar -czf ../../${{ matrix.archive }} zigzag

      - name: Package binary (Windows)
        if: ${{ endsWith(matrix.target, 'windows') }}
        run: |
          cd zig-out/bin
          zip ../../${{ matrix.archive }} zigzag.exe

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zigzag-x86_64-linux.tar.gz
            zigzag-aarch64-linux.tar.gz
            zigzag-x86_64-macos.tar.gz
            zigzag-aarch64-macos.tar.gz
            zigzag-x86_64-windows.zip
          generate_release_notes: true
